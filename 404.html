<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang hoàn thiện - TCalculation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9a9890;
      --border: rgba(0,0,0,0.1);
      --amber-bg: #faeeda;
      --amber-text: #854f0b;
      --amber-bar: #ba7517;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #252523;
        --text-primary: #f0ede6;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
        --border: rgba(255,255,255,0.08);
        --amber-bg: #412402;
        --amber-text: #fac775;
        --amber-bar: #ef9f27;
      }
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 700;
      font-size: 16px;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--text-primary);
      color: var(--surface);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--text-primary); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    .content {
      text-align: center;
      max-width: 440px;
    }

    .icon-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .gear {
      font-size: 44px;
      color: var(--text-secondary);
      display: inline-block;
      animation: spin 4s linear infinite;
    }

    .gear.sm {
      font-size: 30px;
      animation: spin-reverse 3s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .badge {
      display: inline-block;
      background: var(--amber-bg);
      color: var(--amber-text);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 6px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .sub {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .progress-wrap {
      width: 100%;
      max-width: 300px;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin: 0 auto 0.6rem;
    }

    .progress-bar {
      height: 100%;
      width: 60%;
      background: var(--amber-bar);
      border-radius: 99px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { width: 55%; opacity: 0.8; }
      50% { width: 70%; opacity: 1; }
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 13px;
      color: var(--text-muted);
      border-top: 0.5px solid var(--border);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <span class="logo-icon">T</span>
      Calculation
    </a>
    <a class="nav-back" href="index.html">
      <i class="ti ti-chevron-left"></i>
      Quay lại
    </a>
  </nav>

  <main>
    <div class="content">
      <div class="icon-row">
        <i class="ti ti-settings gear"></i>
        <i class="ti ti-tools gear sm"></i>
      </div>

      <div class="badge">Đang hoàn thiện</div>

      <h1>Trang này sắp ra mắt</h1>

      <p class="sub">
        Chúng mình đang hoàn thiện thêm tính năng và nội dung.<br>
        Vui lòng quay lại sau nhé!
      </p>

      <div class="progress-wrap">
        <div class="progress-bar"></div>
      </div>
      <p class="progress-label">Đang trong quá trình phát triển...</p>

      <div class="divider"></div>
    </div>
  </main>

  <footer>
    © 2026 TCalculation · Công cụ tính điểm xét tuyển đại học
  </footer>

</body>
</html>
